<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parada Pediátrica">
<title>Parada Pediátrica · Aerotop/NGM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap');
:root{
  --bg:#0a0505;--bg2:#120808;--bg3:#1a0c0c;--bg4:#221010;
  --border:rgba(255,80,80,.12);--border2:rgba(255,80,80,.22);
  --text:#f5e8e8;--text2:#b89090;--text3:#6b4a4a;
  --red:#e03030;--red2:#b82020;
  --red-dim:rgba(224,48,48,.13);--red-dim2:rgba(224,48,48,.07);
  --red-border:rgba(224,48,48,.35);--red-text:#ff9090;
  --amber:#d4900a;--amber-dim:rgba(212,144,10,.13);--amber-border:rgba(212,144,10,.3);--amber-text:#f0c060;
  --green:#1fa86e;--green-dim:rgba(31,168,110,.13);--green-border:rgba(31,168,110,.3);--green-text:#60d0a0;
  --blue:#378ADD;--blue-dim:rgba(55,138,221,.13);--blue-border:rgba(55,138,221,.3);--blue-text:#90c0f0;
  --purple:#9060d0;--purple-dim:rgba(144,96,208,.13);--purple-border:rgba(144,96,208,.3);--purple-text:#c090f0;
  --r:10px;--rs:6px;
  --mono:'IBM Plex Mono',monospace;--sans:'Syne',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);min-height:100dvh}
body{font-family:var(--sans);color:var(--text)}
#app{max-width:560px;margin:0 auto;padding:0 0 5rem}

/* Header */
.hdr{padding:1.1rem 1rem 0;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:8px;background:var(--red-dim);border:.5px solid var(--red-border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hdr-title{font-size:16px;font-weight:600;letter-spacing:-.02em}
.hdr-sub{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.hdr-badge{font-size:11px;color:var(--text3);font-family:var(--mono);background:var(--bg3);border:.5px solid var(--border);padding:4px 10px;border-radius:20px}

/* Input card */
.input-card{margin:1rem 1rem 0;background:var(--bg2);border:.5px solid var(--red-border);border-radius:var(--r);padding:1rem 1.1rem}
.input-card .row{display:flex;gap:8px;align-items:flex-end;margin-bottom:10px}
.field-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);display:block;margin-bottom:4px}
.inp{width:100%;padding:9px 11px;border:.5px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);font-size:15px;font-family:var(--mono);font-weight:500;outline:none;transition:border-color .15s;appearance:none;-webkit-appearance:none}
.inp:focus{border-color:var(--red)}
.inp-sm{font-size:13px;padding:8px 10px}
.btn-calc{padding:10px 20px;border-radius:var(--rs);border:none;background:var(--red);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);white-space:nowrap;transition:background .15s;flex-shrink:0}
.btn-calc:hover{background:var(--red2)}
.btn-calc:active{transform:scale(.98)}

/* Peso display */
.peso-box{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.peso-chip{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;font-family:var(--mono);border:.5px solid}

/* Section cards */
.section{margin:10px 1rem 0}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;user-select:none}
.sec-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sec-title{font-size:13px;font-weight:600;letter-spacing:-.01em}
.sec-sub{font-size:10px;color:var(--text3);margin-top:1px}
.sec-toggle{margin-left:auto;font-size:12px;color:var(--text3)}
.sec-body{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.sec-body.collapsed{display:none}

/* Drug rows */
.drug-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;padding:9px 12px;border-bottom:.5px solid var(--border)}
.drug-row:last-child{border-bottom:none}
.drug-name{font-size:12px;font-weight:500;color:var(--text)}
.drug-conc{font-size:10px;color:var(--text3);margin-top:1px;font-family:var(--mono)}
.drug-dose{font-size:15px;font-weight:600;font-family:var(--mono);text-align:right}
.drug-vol{font-size:11px;font-family:var(--mono);text-align:right;color:var(--text2);margin-top:1px}

/* Special rows */
.param-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-bottom:.5px solid var(--border)}
.param-row:last-child{border-bottom:none}
.param-lbl{font-size:12px;color:var(--text2)}
.param-val{font-size:15px;font-weight:600;font-family:var(--mono);color:var(--text)}
.param-unit{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px;text-align:right}

/* Alert row */
.alert-row{padding:8px 12px;border-bottom:.5px solid var(--border);display:flex;gap:8px;align-items:flex-start}
.alert-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.alert-text{font-size:11px;color:var(--text2);line-height:1.5}

/* Defib highlight */
.defib-val{font-size:22px;font-weight:700;font-family:var(--mono)}

/* Color helpers */
.c-red{color:var(--red-text)} .bg-red{background:var(--red-dim);border-color:var(--red-border)}
.c-amber{color:var(--amber-text)} .bg-amber{background:var(--amber-dim);border-color:var(--amber-border)}
.c-green{color:var(--green-text)} .bg-green{background:var(--green-dim);border-color:var(--green-border)}
.c-blue{color:var(--blue-text)} .bg-blue{background:var(--blue-dim);border-color:var(--blue-border)}
.c-purple{color:var(--purple-text)} .bg-purple{background:var(--purple-dim);border-color:var(--purple-border)}

/* Output */
.out-card{margin:10px 1rem 0;background:var(--bg2);border:.5px solid var(--green-border);border-radius:var(--r);padding:1rem}
.wa-text{font-family:var(--mono);font-size:11px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-word;max-height:55vh;overflow-y:auto;margin-bottom:10px;background:var(--bg3);border-radius:var(--rs);padding:.75rem}
.wa-text::-webkit-scrollbar{width:3px}
.wa-text::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.btn-copy{width:100%;padding:11px;border-radius:var(--rs);border:none;background:var(--green);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:background .15s}
.btn-copy:hover{background:#17865a}
.btn-copy:active{transform:scale(.98)}
.btn-reset{width:100%;padding:9px;border-radius:var(--rs);border:.5px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--sans);margin-top:6px;transition:all .15s}
.btn-reset:hover{background:var(--bg3)}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:9px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;font-family:var(--sans)}
.toast.show{opacity:1}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:13px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-left">
      <div class="logo">🚨</div>
      <div>
        <div class="hdr-title">Parada Pediátrica</div>
        <div class="hdr-sub">Aerotop / NGM · PALS 2020</div>
      </div>
    </div>
    <div class="hdr-badge" id="hBadge">—</div>
  </div>

  <div class="input-card" id="inputCard">
    <div class="row">
      <div style="flex:1">
        <label class="field-lbl">Peso (kg)</label>
        <input class="inp" id="inPeso" type="number" inputmode="decimal" placeholder="ex: 15" min="1" max="80">
      </div>
      <div style="flex:1">
        <label class="field-lbl">Idade</label>
        <input class="inp" id="inIdade" type="text" placeholder="ex: 3a ou 8m">
      </div>
      <button class="btn-calc" onclick="calcular()">Calcular</button>
    </div>
    <div class="peso-box" id="pesoBox"></div>
  </div>

  <div id="fichaContent"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── DADOS CLÍNICOS ─────────────────────────────────────────────────────────
// Concentrações exatas do Cardputer Aerotop/NGM
const CONC = {
  adrenalina:   {mg:1,    ml:1,   desc:'Adrenalina 1mg/ml'},
  atropina:     {mg:0.5,  ml:1,   desc:'Atropina(0,5) 0.5mg/ml'},
  amiodarona:   {mg:50,   ml:1,   desc:'Amiodarona 50mg/ml'},
  bicarbonato:  {meq:1,   ml:1,   desc:'Bicarbonato 8,4% (1mEq/ml)'},
  calcio:       {mg:100,  ml:1,   desc:'Gluconato Ca 10% (100mg/ml)'},
  lidocaina:    {mg:20,   ml:1,   desc:'Lidocaína(20) 20mg/ml'},
  midazolam:    {mg:5,    ml:1,   desc:'Midazolam(5) 5mg/ml'},
  cetamina:     {mg:50,   ml:1,   desc:'Cetamina(50) 50mg/ml'},
  morfina:      {mg:10,   ml:1,   desc:'Morfina(10) 10mg/ml'},
  fentanil:     {mcg:50,  ml:1,   desc:'Fentanil 50mcg/ml'},
  propofol:     {mg:10,   ml:1,   desc:'Propofol 10mg/ml'},
  tiopental:    {mg:20,   ml:1,   desc:'Tiopental 20mg/ml'},
  pancuronio:   {mg:2,    ml:1,   desc:'Pancurônio 2mg/ml'},
  rocuronio:    {mg:10,   ml:1,   desc:'Rocurônio 10mg/ml'},
  succinilcolina:{mg:50,  ml:1,   desc:'Succinilcolina 50mg/ml'},
  glicose:      {g:0.25,  ml:1,   desc:'Glicose 25% (0.25g/ml)'},
  naloxona:     {mg:0.4,  ml:1,   desc:'Naloxona 0.4mg/ml'},
};

// Seções colapsáveis
let collapsed = {rcp:false, defib:false, iot:false, acesso:false, parada:false, suporte:false, sav:false};

// Estado
let S = {peso:null, idadeStr:'', idadeMeses:null, pesoEstimado:false};

// ── CÁLCULOS ───────────────────────────────────────────────────────────────
function parseIdade(str){
  if(!str || !str.trim()) return null;
  const s = str.trim().toLowerCase();
  // formatos: 3a, 3 anos, 8m, 8 meses, 2a6m, 1a 6m
  const onlyMonths = s.match(/^(\d+)\s*m/);
  if(onlyMonths) return parseInt(onlyMonths[1]);
  const onlyYears = s.match(/^(\d+)\s*a/);
  if(onlyYears) return parseInt(onlyYears[1]) * 12;
  const combined = s.match(/(\d+)\s*a\s*(\d+)\s*m/);
  if(combined) return parseInt(combined[1])*12 + parseInt(combined[2]);
  const num = parseFloat(s);
  if(!isNaN(num)) return num >= 2 ? num*12 : num; // assume anos se >= 2
  return null;
}

function estimarPeso(meses){
  if(meses === null) return null;
  if(meses <= 3)  return Math.max(3, 0.6*meses + 3.5);   // RN-3m
  if(meses <= 12) return 0.5*meses + 4;                   // < 1 ano
  const anos = meses/12;
  if(anos <= 5)  return 2*anos + 8;                       // PALS: 2×idade+8
  if(anos <= 14) return 4*anos;                           // PALS: 4×idade
  return null;
}

function r1(v){ return Math.round(v*10)/10; }
function r2(v){ return Math.round(v*100)/100; }
function fmt(v,d=1){ if(v===null||isNaN(v)) return '—'; return Number(v.toFixed(d)).toString(); }

// Peso máximo para cálculo (cap clínico)
function pesoCalc(peso){ return Math.min(parseFloat(peso), 40); }

// ── FÓRMULAS CLÍNICAS ──────────────────────────────────────────────────────
function calcTOT(peso){
  // Fórmula: (idade em anos / 4) + 4 — mas usamos peso como proxy se não tem idade
  if(S.idadeMeses){
    const a = S.idadeMeses/12;
    const id = r1(a/4 + 4);
    return {
      sem_cuff: fmt(id),
      com_cuff: fmt(r1(id-0.5)),
      profundidade: fmt(r1(id*3)),
    };
  }
  // Estimativa por peso
  const t = peso<=5?3:peso<=8?3.5:peso<=10?4:peso<=12?4.5:peso<=15?5:peso<=20?5.5:peso<=25?6:6.5;
  return{sem_cuff:fmt(t), com_cuff:fmt(t-0.5), profundidade:fmt(r1(t*3))};
}

function calcLaringoscopio(peso, idadeMeses){
  if(!idadeMeses) return peso<=10?'Miller 1':peso<=20?'Miller 2':'Miller 2 / Mac 2';
  const a = idadeMeses/12;
  return a<1?'Miller 0':a<2?'Miller 1':a<8?'Miller 1-2':a<12?'Miller 2':'Miller 2 / Mac 2';
}

function calcDefib(peso){
  const pc = pesoCalc(peso);
  return{
    inicial: fmt(r1(pc*2),0),
    max_episodio: fmt(r1(Math.min(pc*4, 200)),0),
    max_abs: fmt(r1(Math.min(pc*10, 360)),0),
    cardioversao: fmt(r1(pc*0.5),0)+' – '+fmt(r1(pc*1),0),
  };
}

// ── DROGAS ────────────────────────────────────────────────────────────────
function drug(nome, conc, dose_mg, max_mg, unidade, color){
  const pc = pesoCalc(S.peso);
  let dose = r2(pc * dose_mg);
  let capped = false;
  if(max_mg && dose > max_mg){ dose = max_mg; capped = true; }
  const vol = r2(dose / conc);
  return {nome, dose, vol, unidade: unidade||'mg', color: color||'c-red', capped,
    doseStr: fmt(dose) + (capped?' ⚑':''),
    volStr: fmt(vol) + ' ml',
    concDesc: CONC[nome.toLowerCase().replace(/\s/g,'')]?.desc || ''};
}

function drugMcg(nome, concKey, dose_mcg_kg, max_mcg, color){
  const pc = pesoCalc(S.peso);
  const concObj = CONC[concKey];
  const conc_mcg_ml = concObj.mcg ? concObj.mcg : concObj.mg*1000;
  let dose = r2(pc * dose_mcg_kg);
  let capped = false;
  if(max_mcg && dose > max_mcg){ dose = max_mcg; capped = true; }
  const vol = r2(dose / conc_mcg_ml);
  return {nome, dose, vol, unidade:'mcg', color: color||'c-amber', capped,
    doseStr: fmt(dose) + (capped?' ⚑':''),
    volStr: fmt(vol) + ' ml',
    concDesc: concObj.desc};
}

function drugMeq(nome, dose_meq_kg, max_meq){
  const pc = pesoCalc(S.peso);
  let dose = r2(pc * dose_meq_kg);
  let capped = false;
  if(max_meq && dose > max_meq){ dose = max_meq; capped = true; }
  const vol = r2(dose / CONC.bicarbonato.meq);
  return {nome, dose, vol, unidade:'mEq', color:'c-blue', capped,
    doseStr: fmt(dose) + (capped?' ⚑':''),
    volStr: fmt(vol) + ' ml',
    concDesc: CONC.bicarbonato.desc};
}

function calcDrogas(){
  const p = S.peso;
  const pc = pesoCalc(p);
  // Glicose: 0.5g/kg → 2ml/kg de G25%
  const gliVol = fmt(r2(pc*2));

  return {
    // PARADA
    adrenalina: {nome:'Adrenalina', doseStr:fmt(r2(pc*0.01))+'mg', volStr:fmt(r2(pc*0.01/CONC.adrenalina.mg))+'ml', concDesc:CONC.adrenalina.desc, color:'c-red'},
    adrenalina_dose: r2(pc*0.01),
    bicarbonato: drugMeq('Bicarbonato 8,4%', 1, 50),
    calcio: {nome:'Gluconato Ca 10%', doseStr:fmt(r2(pc*60))+'mg', volStr:fmt(r2(pc*60/CONC.calcio.mg))+'ml', concDesc:CONC.calcio.desc, color:'c-blue'},
    atropina: {nome:'Atropina', doseStr:fmt(Math.max(r2(pc*0.02),0.1))+'mg', volStr:fmt(r2(Math.max(r2(pc*0.02),0.1)/CONC.atropina.mg))+'ml', concDesc:CONC.atropina.desc, color:'c-amber', min:true},
    amiodarona: {nome:'Amiodarona', doseStr:fmt(r2(Math.min(pc*5,300)))+'mg', volStr:fmt(r2(Math.min(pc*5,300)/CONC.amiodarona.mg))+'ml', concDesc:CONC.amiodarona.desc, color:'c-purple'},
    lidocaina: {nome:'Lidocaína', doseStr:fmt(r2(Math.min(pc*1,100)))+'mg', volStr:fmt(r2(Math.min(pc*1,100)/CONC.lidocaina.mg))+'ml', concDesc:CONC.lidocaina.desc, color:'c-purple'},
    glicose: {nome:'Glicose 25%', doseStr:fmt(r2(pc*0.5))+'g ('+fmt(r2(pc*2))+'ml)', volStr:gliVol+'ml', concDesc:CONC.glicose.desc, color:'c-green'},

    // IOT / SEDAÇÃO
    midazolam:  {nome:'Midazolam', doseStr:fmt(r2(Math.min(pc*0.2,10)))+'mg', volStr:fmt(r2(Math.min(pc*0.2,10)/CONC.midazolam.mg))+'ml', concDesc:CONC.midazolam.desc, color:'c-blue'},
    cetamina:   {nome:'Cetamina', doseStr:fmt(r2(Math.min(pc*2,200)))+'mg', volStr:fmt(r2(Math.min(pc*2,200)/CONC.cetamina.mg))+'ml', concDesc:CONC.cetamina.desc, color:'c-amber'},
    propofol:   {nome:'Propofol', doseStr:fmt(r2(Math.min(pc*2,200)))+'mg', volStr:fmt(r2(Math.min(pc*2,200)/CONC.propofol.mg))+'ml', concDesc:CONC.propofol.desc, color:'c-blue'},
    tiopental:  {nome:'Tiopental', doseStr:fmt(r2(Math.min(pc*5,500)))+'mg', volStr:fmt(r2(Math.min(pc*5,500)/CONC.tiopental.mg))+'ml', concDesc:CONC.tiopental.desc, color:'c-blue'},
    fentanil:   {nome:'Fentanil', doseStr:fmt(r2(Math.min(pc*2,200)))+'mcg', volStr:fmt(r2(Math.min(pc*2,200)/CONC.fentanil.mcg))+'ml', concDesc:CONC.fentanil.desc, color:'c-amber'},
    morfina:    {nome:'Morfina', doseStr:fmt(r2(Math.min(pc*0.1,10)))+'mg', volStr:fmt(r2(Math.min(pc*0.1,10)/CONC.morfina.mg))+'ml', concDesc:CONC.morfina.desc, color:'c-amber'},

    // BNM
    succinilcolina: {nome:'Succinilcolina', doseStr:fmt(r2(Math.min(pc*1.5,200)))+'mg', volStr:fmt(r2(Math.min(pc*1.5,200)/CONC.succinilcolina.mg))+'ml', concDesc:CONC.succinilcolina.desc, color:'c-green'},
    rocuronio:  {nome:'Rocurônio', doseStr:fmt(r2(Math.min(pc*0.6,100)))+'mg', volStr:fmt(r2(Math.min(pc*0.6,100)/CONC.rocuronio.mg))+'ml', concDesc:CONC.rocuronio.desc, color:'c-green'},
    pancuronio: {nome:'Pancurônio', doseStr:fmt(r2(Math.min(pc*0.1,10)))+'mg', volStr:fmt(r2(Math.min(pc*0.1,10)/CONC.pancuronio.mg))+'ml', concDesc:CONC.pancuronio.desc, color:'c-green'},

    // ANALGESIA/SUPORTE
    naloxona: {nome:'Naloxona', doseStr:fmt(r2(Math.min(pc*0.01,2)))+'mg', volStr:fmt(r2(Math.min(pc*0.01,2)/CONC.naloxona.mg))+'ml', concDesc:CONC.naloxona.desc, color:'c-amber'},

    // Fluidos
    bolus: {nome:'Bolus SF/RL', doseStr:fmt(r1(Math.min(p*20,1000)))+'ml', volStr:'20ml/kg', concDesc:'SF 0,9% ou RL', color:'c-blue'},
    cristal_choque: {nome:'Cristaloide choque', doseStr:fmt(r1(Math.min(p*10,500)))+'ml (1ª dose)', volStr:'10ml/kg', concDesc:'Repetir até 3x avaliando resp.', color:'c-blue'},
  };
}

// ── RENDER ────────────────────────────────────────────────────────────────
function calcular(){
  const pesoInput = parseFloat(document.getElementById('inPeso').value);
  const idadeStr  = document.getElementById('inIdade').value.trim();
  const idadeMeses = parseIdade(idadeStr);
  let peso = pesoInput;
  let pesoEstimado = false;

  if(!peso || peso <= 0){
    if(idadeMeses !== null){
      const est = estimarPeso(idadeMeses);
      if(est){ peso = r1(est); pesoEstimado = true; }
      else{ showToast('Informe o peso'); return; }
    } else { showToast('Informe peso ou idade'); return; }
  }

  S.peso = peso;
  S.idadeStr = idadeStr;
  S.idadeMeses = idadeMeses;
  S.pesoEstimado = pesoEstimado;

  document.getElementById('hBadge').textContent = peso + 'kg';
  renderPesoBox();
  renderFicha();
  document.getElementById('fichaContent').scrollIntoView({behavior:'smooth', block:'start'});
}

function renderPesoBox(){
  const p = S.peso;
  const pb = document.getElementById('pesoBox');
  if(!p){ pb.innerHTML=''; return; }

  const chips = [];
  if(S.pesoEstimado){
    chips.push({lbl:'Peso estimado', val:S.peso+'kg', cl:'bg-amber c-amber'});
    chips.push({lbl:'⚠ Confirme o peso real', val:'', cl:'bg-red c-red'});
  } else {
    chips.push({lbl:'Peso', val:S.peso+'kg', cl:'bg-green c-green'});
  }
  if(S.idadeMeses !== null){
    const a = Math.floor(S.idadeMeses/12);
    const m = S.idadeMeses % 12;
    const label = a > 0 ? (a+'a'+(m>0?' '+m+'m':'')) : S.idadeMeses+'m';
    chips.push({lbl:'Idade', val:label, cl:'bg-blue c-blue'});
  }
  // Cap aviso
  if(S.peso > 40) chips.push({lbl:'Dose limitada a 40kg', val:'', cl:'bg-amber c-amber'});

  pb.innerHTML = chips.map(ch=>`
    <div class="peso-chip ${ch.cl}" style="display:flex;align-items:center;gap:6px">
      <span style="opacity:.7;font-size:10px">${ch.lbl}</span>
      ${ch.val?`<span>${ch.val}</span>`:''}
    </div>`).join('');
}

function togSec(key){
  collapsed[key] = !collapsed[key];
  const body = document.getElementById('sec-'+key);
  const icon = document.getElementById('tog-'+key);
  if(body){ body.classList.toggle('collapsed', collapsed[key]); }
  if(icon){ icon.textContent = collapsed[key] ? '▶' : '▼'; }
}

function drugRowHTML(d){
  return `<div class="drug-row">
    <div>
      <div class="drug-name">${d.nome}</div>
      <div class="drug-conc">${d.concDesc}</div>
    </div>
    <div style="text-align:right">
      <div class="drug-dose ${d.color}">${d.doseStr}</div>
      <div class="drug-vol">${d.volStr}</div>

  </div>`;
}

function paramRowHTML(lbl, val, unit, color){
  return `<div class="param-row">

}

// ── WHATSAPP TEXT ──────────────────────────────────────────────────────────
function gerarWA(d, def, tot, lari){
  const p  = S.peso;
  const pc = pesoCalc(p);
  const est = S.pesoEstimado ? ' (ESTIMADO⚠)' : '';
  const idade = S.idadeStr ? ' · ' + S.idadeStr : '';
  const now = new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});

  let t = '';
  t += '🚨 PARADA PEDIÁTRICA — Aerotop/NGM\n';
  t += '━━━━━━━━━━━━━━━━━━━━━━━\n';
  t += '⏱ ' + now + '\n';
  t += '⚖ Peso: ' + p + 'kg' + est + idade + '\n';
  if(p > 40) t += '⚠ Doses limitadas a 40kg\n';
  t += '\n';

  t += '💗 RCP\n';
  t += '• Compressões: 100–120/min\n';
  t += '• Adrenalina IV/IO: ' + fmt(r2(pc*0.01)) + 'mg (' + fmt(r2(pc*0.01/CONC.adrenalina.mg)) + 'ml) — a cada 3–5min\n\n';

  t += '⚡ DESFIBRILAÇÃO\n';
  t += '• 1ª descarga: ' + def.inicial + ' J (2J/kg)\n';
  t += '• 2ª+ descarga: ' + def.max_episodio + ' J (4J/kg, máx 200J)\n';
  t += '• Cardioversão: ' + def.cardioversao + ' J\n\n';

  t += '🫁 VIA AÉREA\n';
  t += '• TOT s/cuff: ' + tot.sem_cuff + 'mm · c/cuff: ' + tot.com_cuff + 'mm\n';
  t += '• Profundidade: ' + tot.profundidade + 'cm\n';
  t += '• Laringoscópio: ' + lari + '\n';
  t += '• RSI: Cetamina ' + d.cetamina.doseStr + ' (' + d.cetamina.volStr + ')\n';
  t += '       Succi ' + d.succinilcolina.doseStr + ' (' + d.succinilcolina.volStr + ')\n\n';

  t += '💊 DROGAS DE PARADA\n';
  const paradaDrugs = [d.adrenalina, d.bicarbonato, d.calcio, d.atropina, d.amiodarona, d.lidocaina, d.glicose];
  paradaDrugs.forEach(dr => t += '• ' + dr.nome + ': ' + dr.doseStr + ' (' + dr.volStr + ')\n');

  t += '\n💉 ACESSO\n';
  t += '• IO tibial proximal (1ª opção se crítico)\n';
  t += '• Bolus: ' + d.bolus.doseStr + ' (SF/RL 20ml/kg)\n\n';

  t += '🔬 SEDOANALGESIA\n';
  t += '• Midazolam: ' + d.midazolam.doseStr + ' (' + d.midazolam.volStr + ')\n';
  t += '• Morfina: ' + d.morfina.doseStr + ' (' + d.morfina.volStr + ')\n';
  t += '• Fentanil: ' + d.fentanil.doseStr + ' (' + d.fentanil.volStr + ')\n\n';

  t += '━━━━━━━━━━━━━━━━━━━━━━━\n';
  t += '⚑ = dose limitada · Checar ritmo antes de medicar\n';
  t += 'PALS 2020 · Aerotop/NGM';

  return t;
}

function copiarWA(){
  const txt = gerarWA(calcDrogas(), calcDefib(S.peso), calcTOT(S.peso), calcLaringoscopio(S.peso, S.idadeMeses));
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>showToast('✓ Copiado!')).catch(()=>fallbackCopy(txt));
  } else fallbackCopy(txt);
}

function fallbackCopy(txt){
  const ta = document.createElement('textarea');
  ta.value = txt; ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast('✓ Copiado!');
}

function resetar(){
  S = {peso:null, idadeStr:'', idadeMeses:null, pesoEstimado:false};
  document.getElementById('inPeso').value = '';
  document.getElementById('inIdade').value = '';
  document.getElementById('pesoBox').innerHTML = '';
  document.getElementById('fichaContent').innerHTML = '';
  document.getElementById('hBadge').textContent = '—';
  window.scrollTo({top:0,behavior:'smooth'});
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// Enter key on inputs
document.addEventListener('keydown', e=>{
  if(e.key==='Enter') calcular();
});

function injectManifest(){
  try{
    const m={name:'Parada Pediátrica',short_name:'Parada Ped.',start_url:'.',display:'standalone',background_color:'#0a0505',theme_color:'#0a0505',
      icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%230a0505'/%3E%3Ctext x='96' y='130' text-anchor='middle' font-size='100'%3E🚨%3C/text%3E%3C/svg%3E",sizes:'192x192',type:'image/svg+xml'}]};
    const link=document.createElement('link');
    link.rel='manifest';
    link.href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));
    document.head.appendChild(link);
  }catch(e){}
}

injectManifest();
